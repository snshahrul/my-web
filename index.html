<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SN Consultancy | Asset Reliability Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --navy: #0f172a;
            --navy-light: #1e293b;
            --blue: #3b82f6;
            --blue-dark: #2563eb;
            --green: #22c55e;
            --green-dark: #16a34a;
            --amber: #f59e0b;
            --red: #ef4444;
            --gray-50: #f8fafc;
            --gray-100: #f1f5f9;
            --gray-200: #e2e8f0;
            --gray-300: #cbd5e1;
            --gray-400: #94a3b8;
            --gray-500: #64748b;
            --gray-600: #475569;
            --gray-700: #334155;
            --gray-800: #1e293b;
            --gray-900: #0f172a;
            --sidebar-w: 260px;
            --radius: 12px;
            --radius-sm: 8px;
            --radius-lg: 16px;
            --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
            --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.07), 0 2px 4px -1px rgba(0,0,0,0.04);
            --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.08), 0 4px 6px -2px rgba(0,0,0,0.04);
            --shadow-xl: 0 20px 25px -5px rgba(0,0,0,0.1), 0 10px 10px -5px rgba(0,0,0,0.04);
            --transition: 0.2s ease;
        }
        body { font-family: 'Inter', -apple-system, sans-serif; background: var(--gray-100); color: var(--gray-900); height: 100vh; overflow: hidden; -webkit-font-smoothing: antialiased; }

        /* ========== LOGIN ========== */
        .login-screen {
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
            background: linear-gradient(135deg, var(--navy) 0%, #1a2744 50%, var(--navy) 100%);
            padding: 20px; position: relative; overflow: hidden;
        }
        .login-screen::before {
            content: ''; position: absolute; width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(59,130,246,0.08) 0%, transparent 70%);
            top: -200px; right: -200px; border-radius: 50%;
        }
        .login-screen::after {
            content: ''; position: absolute; width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(34,197,94,0.06) 0%, transparent 70%);
            bottom: -100px; left: -100px; border-radius: 50%;
        }
        .login-card {
            background: rgba(255,255,255,0.97); border-radius: var(--radius-lg);
            padding: 44px 40px; max-width: 420px; width: 100%;
            box-shadow: var(--shadow-xl); position: relative;
            animation: fadeUp 0.5s ease;
        }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .login-brand { text-align: center; margin-bottom: 32px; }
        .login-brand .logo-icon {
            width: 52px; height: 52px; background: linear-gradient(135deg, var(--blue), var(--blue-dark));
            border-radius: 14px; display: inline-flex; align-items: center; justify-content: center;
            margin-bottom: 16px; box-shadow: 0 4px 12px rgba(59,130,246,0.3);
        }
        .login-brand h1 { font-size: 1.5rem; font-weight: 700; color: var(--gray-900); letter-spacing: -0.5px; }
        .login-brand p { font-size: 0.875rem; color: var(--gray-500); margin-top: 4px; }
        .login-error {
            background: #fef2f2; color: var(--red); border: 1px solid #fecaca;
            border-radius: var(--radius-sm); padding: 10px 14px; font-size: 0.85rem;
            margin-bottom: 20px; display: none; align-items: center; gap: 8px;
        }
        .login-error.show { display: flex; }
        .form-group { margin-bottom: 18px; }
        .form-group label {
            display: block; margin-bottom: 6px; font-size: 0.85rem; font-weight: 500; color: var(--gray-700);
        }
        .form-group .input-wrap {
            position: relative; display: flex; align-items: center;
        }
        .form-group .input-wrap svg {
            position: absolute; left: 14px; color: var(--gray-400); pointer-events: none;
        }
        .form-group input {
            width: 100%; padding: 11px 14px 11px 42px;
            border: 1.5px solid var(--gray-200); border-radius: var(--radius-sm);
            font-family: inherit; font-size: 0.9rem; color: var(--gray-900);
            background: var(--gray-50); transition: var(--transition);
            outline: none;
        }
        .form-group input:focus {
            border-color: var(--blue); box-shadow: 0 0 0 3px rgba(59,130,246,0.12);
            background: white;
        }
        .form-group input::placeholder { color: var(--gray-400); }
        .login-btn {
            width: 100%; padding: 12px; border: none; border-radius: var(--radius-sm);
            background: linear-gradient(135deg, var(--blue), var(--blue-dark));
            color: white; font-weight: 600; font-size: 0.95rem; cursor: pointer;
            transition: var(--transition); position: relative;
            box-shadow: 0 4px 14px rgba(59,130,246,0.3);
        }
        .login-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(59,130,246,0.35); }
        .login-btn:active { transform: translateY(0); }
        .login-btn:disabled { opacity: 0.65; cursor: not-allowed; transform: none; }
        .login-btn .spinner {
            display: none; width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white; border-radius: 50%; animation: spin 0.6s linear infinite;
            position: absolute; left: 50%; margin-left: -9px; top: 50%; margin-top: -9px;
        }
        .login-btn.loading .spinner { display: block; }
        .login-btn.loading span { visibility: hidden; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .login-footer { margin-top: 20px; text-align: center; }
        .login-footer p { font-size: 0.75rem; color: var(--gray-400); }
        .demo-creds {
            margin-top: 20px; padding: 14px; background: var(--gray-50);
            border-radius: var(--radius-sm); border: 1px dashed var(--gray-200);
        }
        .demo-creds summary { font-size: 0.8rem; color: var(--gray-500); cursor: pointer; font-weight: 500; }
        .demo-creds table { width: 100%; margin-top: 10px; border-collapse: collapse; font-size: 0.78rem; }
        .demo-creds td { padding: 4px 6px; color: var(--gray-600); }
        .demo-creds td:first-child { font-weight: 600; color: var(--gray-700); }

        /* ========== APP LAYOUT ========== */
        .app-container { display: none; height: 100vh; width: 100%; }
        .app-container.active { display: flex; }

        /* ========== SIDEBAR ========== */
        .sidebar {
            width: var(--sidebar-w); background: var(--navy);
            display: flex; flex-direction: column; flex-shrink: 0;
            box-shadow: 2px 0 20px rgba(0,0,0,0.1); z-index: 20;
        }
        .sidebar-header {
            padding: 24px 20px; border-bottom: 1px solid rgba(255,255,255,0.06);
            display: flex; align-items: center; gap: 12px;
        }
        .sidebar-header .brand-icon {
            width: 36px; height: 36px; background: linear-gradient(135deg, var(--blue), var(--blue-dark));
            border-radius: 10px; display: flex; align-items: center; justify-content: center;
            flex-shrink: 0; font-weight: 700; font-size: 0.85rem; color: white;
        }
        .sidebar-header .brand-text h1 { font-size: 1.1rem; font-weight: 700; color: white; letter-spacing: -0.3px; }
        .sidebar-header .brand-text p { font-size: 0.65rem; color: var(--gray-400); margin-top: 1px; }
        .nav-menu { flex: 1; padding: 16px 12px; display: flex; flex-direction: column; gap: 2px; overflow-y: auto; }
        .nav-item {
            display: flex; align-items: center; gap: 12px; padding: 10px 14px;
            border-radius: var(--radius-sm); cursor: pointer; transition: all var(--transition);
            color: var(--gray-400); font-size: 0.875rem; font-weight: 500; text-decoration: none;
        }
        .nav-item:hover { background: rgba(255,255,255,0.06); color: var(--gray-200); }
        .nav-item.active { background: rgba(59,130,246,0.15); color: var(--blue); }
        .nav-item .nav-icon { width: 20px; height: 20px; flex-shrink: 0; }
        .nav-item .nav-icon svg { width: 20px; height: 20px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
        .nav-label { flex: 1; }
        .user-info-sidebar {
            padding: 16px 14px; border-top: 1px solid rgba(255,255,255,0.06);
            display: flex; align-items: center; gap: 10px;
        }
        .user-avatar {
            width: 36px; height: 36px; border-radius: 50%;
            background: linear-gradient(135deg, var(--blue), #6366f1);
            display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 0.8rem; color: white; flex-shrink: 0;
        }
        .user-details { flex: 1; min-width: 0; }
        .user-name { font-size: 0.85rem; font-weight: 600; color: white; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .user-role { font-size: 0.7rem; color: var(--gray-400); }
        .logout-btn {
            background: none; border: none; color: var(--gray-500); cursor: pointer;
            padding: 6px; border-radius: 6px; transition: var(--transition);
            display: flex; align-items: center; justify-content: center;
        }
        .logout-btn:hover { background: rgba(255,255,255,0.08); color: var(--red); }
        .logout-btn svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

        /* ========== MAIN CONTENT ========== */
        .main-content {
            flex: 1; display: flex; flex-direction: column; overflow: hidden;
            background: var(--gray-100);
        }
        .top-bar {
            padding: 20px 32px; background: white; border-bottom: 1px solid var(--gray-200);
            display: flex; justify-content: space-between; align-items: center; flex-shrink: 0;
        }
        .page-title { font-size: 1.35rem; font-weight: 700; color: var(--gray-900); letter-spacing: -0.3px; }
        .content-area {
            flex: 1; overflow-y: auto; padding: 28px 32px;
        }

        /* ========== KPI CARDS ========== */
        .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); gap: 16px; margin-bottom: 28px; }
        .kpi-card {
            background: white; border-radius: var(--radius); padding: 20px;
            box-shadow: var(--shadow); border: 1px solid var(--gray-200);
            transition: all var(--transition);
        }
        .kpi-card:hover { box-shadow: var(--shadow-md); transform: translateY(-1px); }
        .kpi-card .kpi-icon {
            width: 36px; height: 36px; border-radius: 10px; display: flex;
            align-items: center; justify-content: center; margin-bottom: 14px;
        }
        .kpi-card .kpi-icon svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
        .kpi-value { font-size: 1.75rem; font-weight: 800; color: var(--gray-900); letter-spacing: -0.5px; line-height: 1.2; }
        .kpi-label { font-size: 0.8rem; color: var(--gray-500); margin-top: 4px; font-weight: 500; }

        /* ========== CHARTS ========== */
        .charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 28px; }
        .chart-card {
            background: white; border-radius: var(--radius); padding: 22px;
            box-shadow: var(--shadow); border: 1px solid var(--gray-200);
        }
        .chart-card h3 { font-size: 0.9rem; font-weight: 600; color: var(--gray-700); margin-bottom: 16px; }
        .chart-card canvas { max-height: 220px; max-width: 100%; }

        /* ========== SECTION HEADER ========== */
        .section-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 16px; margin-top: 8px;
        }
        .section-header h3 { font-size: 1rem; font-weight: 600; color: var(--gray-700); }

        /* ========== ASSET CARDS ========== */
        .asset-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }
        .asset-card {
            background: white; border-radius: var(--radius); padding: 18px;
            cursor: pointer; transition: all var(--transition);
            box-shadow: var(--shadow); border: 1px solid var(--gray-200);
            border-left: 4px solid var(--gray-300);
        }
        .asset-card:hover { box-shadow: var(--shadow-lg); transform: translateY(-2px); border-color: var(--gray-300); }
        .asset-card.border-operational { border-left-color: var(--green); }
        .asset-card.border-caution { border-left-color: var(--amber); }
        .asset-card.border-critical { border-left-color: var(--red); }
        .asset-card .asset-name { font-weight: 600; font-size: 0.95rem; color: var(--gray-900); }
        .asset-card .asset-meta { font-size: 0.8rem; color: var(--gray-500); margin-top: 4px; }
        .asset-card .health-row { margin-top: 14px; }
        .asset-card .health-row .health-header { display: flex; justify-content: space-between; font-size: 0.78rem; color: var(--gray-600); margin-bottom: 5px; }
        .health-bar { background: var(--gray-200); border-radius: 20px; height: 6px; overflow: hidden; }
        .health-bar-fill { height: 6px; border-radius: 20px; transition: width 0.6s ease; }

        /* ========== TABLES ========== */
        .table-wrap {
            background: white; border-radius: var(--radius); overflow: hidden;
            box-shadow: var(--shadow); border: 1px solid var(--gray-200);
        }
        .data-table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
        .data-table th {
            text-align: left; padding: 12px 18px; font-weight: 600; font-size: 0.78rem;
            color: var(--gray-500); text-transform: uppercase; letter-spacing: 0.04em;
            background: var(--gray-50); border-bottom: 1px solid var(--gray-200);
        }
        .data-table td { padding: 12px 18px; border-bottom: 1px solid var(--gray-100); color: var(--gray-700); }
        .data-table tbody tr { transition: var(--transition); }
        .data-table tbody tr:hover { background: var(--gray-50); }
        .data-table tbody tr:last-child td { border-bottom: none; }
        .data-table .empty { text-align: center; padding: 40px 18px; color: var(--gray-400); }

        /* ========== BUTTONS ========== */
        .btn {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 9px 18px; border-radius: var(--radius-sm); border: none;
            font-family: inherit; font-size: 0.85rem; font-weight: 500;
            cursor: pointer; transition: all var(--transition);
        }
        .btn svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
        .btn-primary { background: var(--blue); color: white; }
        .btn-primary:hover { background: var(--blue-dark); box-shadow: 0 4px 12px rgba(59,130,246,0.3); transform: translateY(-1px); }
        .btn-secondary { background: var(--gray-100); color: var(--gray-700); border: 1px solid var(--gray-200); }
        .btn-secondary:hover { background: var(--gray-200); }
        .btn-sm { padding: 6px 12px; font-size: 0.8rem; }
        .btn-xs { padding: 4px 10px; font-size: 0.75rem; border-radius: 6px; }
        .actions { display: flex; gap: 8px; }

        /* ========== STATUS BADGES ========== */
        .badge {
            display: inline-flex; align-items: center; gap: 5px;
            padding: 3px 10px; border-radius: 20px; font-size: 0.72rem;
            font-weight: 600; letter-spacing: 0.01em;
        }
        .badge .dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; }
        .badge-operational { background: #f0fdf4; color: #15803d; }
        .badge-operational .dot { background: var(--green); }
        .badge-caution { background: #fffbeb; color: #b45309; }
        .badge-caution .dot { background: var(--amber); }
        .badge-critical { background: #fef2f2; color: #b91c1c; }
        .badge-critical .dot { background: var(--red); }
        .badge-risk-low { background: #f0fdf4; color: #15803d; }
        .badge-risk-medium { background: #fffbeb; color: #b45309; }
        .badge-risk-high { background: #fef2f2; color: #b91c1c; }

        /* ========== MODAL ========== */
        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(15,23,42,0.5); backdrop-filter: blur(4px);
            display: flex; align-items: center; justify-content: center;
            z-index: 1000; animation: fadeIn 0.15s ease;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .modal {
            background: white; border-radius: var(--radius-lg);
            padding: 28px; max-width: 520px; width: 90%; max-height: 85vh;
            overflow-y: auto; box-shadow: var(--shadow-xl);
            animation: scaleIn 0.2s ease;
        }
        @keyframes scaleIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .modal h3 { font-size: 1.1rem; font-weight: 700; color: var(--gray-900); margin-bottom: 22px; display: flex; align-items: center; gap: 8px; }
        .modal .form-group { margin-bottom: 16px; }
        .modal .form-group label { display: block; font-size: 0.82rem; font-weight: 500; color: var(--gray-700); margin-bottom: 5px; }
        .modal .form-group input,
        .modal .form-group select,
        .modal .form-group textarea {
            width: 100%; padding: 10px 12px; border: 1.5px solid var(--gray-200);
            border-radius: var(--radius-sm); font-family: inherit; font-size: 0.88rem;
            background: var(--gray-50); transition: var(--transition); outline: none;
        }
        .modal .form-group input:focus,
        .modal .form-group select:focus,
        .modal .form-group textarea:focus {
            border-color: var(--blue); box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
            background: white;
        }
        .modal .form-group textarea { resize: vertical; min-height: 70px; }
        .modal .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 24px; }

        /* ========== TOAST ========== */
        .toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 2000; display: flex; flex-direction: column; gap: 8px; }
        .toast {
            padding: 12px 20px; border-radius: var(--radius-sm);
            color: white; font-size: 0.88rem; font-weight: 500;
            box-shadow: var(--shadow-lg); animation: toastIn 0.3s ease;
            display: flex; align-items: center; gap: 8px;
        }
        .toast-success { background: #166534; }
        .toast-error { background: #991b1b; }
        @keyframes toastIn { from { opacity: 0; transform: translateX(100%); } to { opacity: 1; transform: translateX(0); } }

        /* ========== CONNECTION STATUS ========== */
        .conn-status {
            position: fixed; top: 16px; right: 16px;
            padding: 5px 12px; border-radius: 20px; font-size: 0.72rem;
            font-weight: 500; z-index: 100; transition: var(--transition);
            display: flex; align-items: center; gap: 6px;
        }
        .conn-status .conn-dot { width: 7px; height: 7px; border-radius: 50%; }
        .conn-connected { background: #f0fdf4; color: #15803d; }
        .conn-connected .conn-dot { background: var(--green); }
        .conn-disconnected { background: #fef2f2; color: #b91c1c; }
        .conn-disconnected .conn-dot { background: var(--red); }

        /* ========== DETAIL PAGE ========== */
        .detail-card { background: white; border-radius: var(--radius); box-shadow: var(--shadow); border: 1px solid var(--gray-200); }
        .detail-header { padding: 24px 28px; border-bottom: 1px solid var(--gray-200); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
        .detail-header h2 { font-size: 1.25rem; font-weight: 700; color: var(--gray-900); }
        .detail-body { padding: 24px 28px; }
        .detail-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 28px; }
        .detail-stat { background: var(--gray-50); border-radius: var(--radius-sm); padding: 14px 16px; }
        .detail-stat .stat-label { font-size: 0.72rem; color: var(--gray-500); text-transform: uppercase; letter-spacing: 0.04em; font-weight: 600; }
        .detail-stat .stat-value { font-size: 1.05rem; font-weight: 700; color: var(--gray-900); margin-top: 3px; }

        /* ========== LOADING SHIMMER ========== */
        .shimmer { background: linear-gradient(90deg, var(--gray-200) 25%, var(--gray-100) 50%, var(--gray-200) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: var(--radius-sm); }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        .loading-screen { display: flex; align-items: center; justify-content: center; height: 50vh; flex-direction: column; gap: 16px; }
        .spinner-lg { width: 36px; height: 36px; border: 3px solid var(--gray-200); border-top-color: var(--blue); border-radius: 50%; animation: spin 0.7s linear infinite; }

        /* ========== RESPONSIVE ========== */
        @media (max-width: 1024px) {
            .charts-row { grid-template-columns: 1fr; }
        }
        @media (max-width: 768px) {
            .sidebar { width: 64px; }
            .sidebar-header { padding: 16px 14px; }
            .sidebar-header .brand-text, .nav-label, .user-details { display: none; }
            .nav-item { justify-content: center; padding: 10px; }
            .user-info-sidebar { justify-content: center; padding: 12px 8px; }
            .logout-btn { display: none; }
            .top-bar { padding: 16px 16px; }
            .content-area { padding: 16px; }
            .page-title { font-size: 1.1rem; }
            .kpi-grid { grid-template-columns: repeat(2, 1fr); }
            .asset-grid { grid-template-columns: 1fr; }
            .login-card { padding: 32px 24px; }
        }
        @media (max-width: 480px) {
            .kpi-grid { grid-template-columns: 1fr; }
        }

        /* ========== SCROLLBAR ========== */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--gray-300); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--gray-400); }
    </style>
</head>
<body>

<!-- CONNECTION STATUS -->
<div id="connStatus" class="conn-status conn-disconnected">
    <span class="conn-dot"></span><span id="connText">Connecting...</span>
</div>

<!-- LOGIN SCREEN -->
<div id="loginScreen" class="login-screen">
    <div class="login-card">
        <div class="login-brand">
            <div class="logo-icon">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
                </svg>
            </div>

<!-- TOAST CONTAINER -->
<div class="toast-container" id="toastContainer"></div>

<script>
    const API_URL = 'http://localhost:3001/api';
    let authToken = null;
    let currentUser = null;
    let currentTab = 'dashboard';
    let assets = [];
    let inspections = [];
    let documents = [];
    let chartInstances = {};

    // ============ HELPERS ============
    function showToast(message, type = 'success') {
        const container = document.getElementById('toastContainer');
        const toast = document.createElement('div');
        toast.className = `toast toast-${type}`;
        const icon = type === 'success'
            ? '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>'
            : '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>';
        toast.innerHTML = icon + message;
        container.appendChild(toast);
        setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 3500);
    }

    function updateConnection(connected, message) {
        const el = document.getElementById('connStatus');
        const txt = document.getElementById('connText');
        el.className = `conn-status ${connected ? 'conn-connected' : 'conn-disconnected'}`;
        txt.textContent = message || (connected ? 'Connected' : 'Disconnected');
    }

    function escapeHtml(str) { if (!str) return ''; return String(str).replace(/[&<>]/g, m => m === '&' ? '&amp;' : (m === '<' ? '&lt;' : '&gt;')); }

    function statusLabel(s) { return s ? s.charAt(0).toUpperCase() + s.slice(1) : 'Operational'; }
    function riskLabel(s) { if (s >= 70) return 'high'; if (s >= 40) return 'medium'; return 'low'; }
    function formatDate(d) { if (!d) return '—'; const dt = d.split('T')[0] || d; return dt; }
    function healthColor(h) { return h >= 70 ? 'var(--green)' : h >= 40 ? 'var(--amber)' : 'var(--red)'; }

    function roleDisplay(role) {
        const map = { admin: 'Administrator', manager: 'Asset Manager', engineer: 'Engineer', supervisor: 'Supervisor' };
        return map[role] || role;
    }

    // ============ API CALLS ============
    async function apiCall(endpoint, method = 'GET', body = null) {
        const options = { method, headers: { 'Content-Type': 'application/json' } };
        if (authToken) options.headers['Authorization'] = `Bearer ${authToken}`;
        if (body) options.body = JSON.stringify(body);
        const response = await fetch(`${API_URL}${endpoint}`, options);
        if (!response.ok) {
            const err = await response.json().catch(() => ({}));
            throw new Error(err.error || `HTTP ${response.status}`);
        }
        if (response.status === 204) return null;
        return await response.json();
    }

    // ============ LOGIN ============
    async function handleLogin() {
        const email = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value;
        const errorEl = document.getElementById('loginError');
        const errorText = document.getElementById('loginErrorText');
        const btn = document.getElementById('loginBtn');

        errorEl.classList.remove('show');

        if (!email || !password) {
            errorText.textContent = 'Please enter both email and password';
            errorEl.classList.add('show');
            return;
        }

        btn.classList.add('loading');
        btn.disabled = true;

        try {
            updateConnection(false, 'Authenticating...');
            const data = await apiCall('/login', 'POST', { email, password });

            authToken = data.token;
            currentUser = data.user;
            updateConnection(true, `Signed in as ${currentUser.name}`);

            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('mainApp').classList.add('active');
            document.getElementById('sidebarUserName').textContent = currentUser.name;
            document.getElementById('sidebarUserRole').textContent = roleDisplay(currentUser.role);
            document.getElementById('sidebarUserAvatar').textContent = currentUser.name.charAt(0).toUpperCase();

            const usersNav = document.getElementById('usersNavItem');
            if (usersNav) usersNav.style.display = currentUser.role === 'admin' ? 'flex' : 'none';

            await loadAllData();
            setActiveTab('dashboard');
        } catch (err) {
            updateConnection(false, 'Login failed');
            errorText.textContent = err.message.includes('fetch') ? 'Cannot reach server. Make sure the backend is running on port 3001.' : err.message;
            errorEl.classList.add('show');
        } finally {
            btn.classList.remove('loading');
            btn.disabled = false;
        }
    }

    // Enter key to login
    document.addEventListener('keydown', e => {
        if (e.key === 'Enter' && document.getElementById('loginScreen').style.display !== 'none') {
            handleLogin();
        }
    });

    async function loadAllData() {
        try {
            [assets, inspections, documents] = await Promise.all([
                apiCall('/assets'), apiCall('/inspections'), apiCall('/documents')
            ]);
            assets = assets || []; inspections = inspections || []; documents = documents || [];
            updateConnection(true, `${assets.length} assets loaded`);
        } catch (err) {
            console.error('Load error:', err);
            updateConnection(false, 'Failed to load data');
            assets = []; inspections = []; documents = [];
        }
    }

    function logout() {
        authToken = null;
        currentUser = null;
        Object.values(chartInstances).forEach(c => { try { c.destroy(); } catch(e) {} });
        chartInstances = {};
        document.getElementById('loginScreen').style.display = 'flex';
        document.getElementById('mainApp').classList.remove('active');
        document.getElementById('loginEmail').value = '';
        document.getElementById('loginPassword').value = '';
        updateConnection(false, 'Signed out');
    }

    // ============ NAVIGATION ============
    function setActiveTab(tabId) {
        currentTab = tabId;
        document.querySelectorAll('.nav-item').forEach(item => {
            item.classList.toggle('active', item.getAttribute('data-tab') === tabId);
        });
        const titles = { dashboard: 'Dashboard', assets: 'Assets Registry', inspections: 'Inspections Log', documents: 'Document Bank', users: 'User Management', reports: 'Executive Reports' };
        document.getElementById('pageTitle').textContent = titles[tabId] || 'Dashboard';
        renderCurrentView();
    }

    function renderCurrentView() {
        const container = document.getElementById('dynamicContent');
        if (!container) return;
        const renderers = {
            dashboard: renderDashboard,
            assets: renderAssetsList,
            inspections: renderInspections,
            documents: renderDocuments,
            users: renderUsers,
            reports: renderReports
        };
        (renderers[currentTab] || renderDashboard)(container);
    }

    document.querySelectorAll('.nav-item').forEach(item => {
        item.addEventListener('click', () => setActiveTab(item.getAttribute('data-tab')));
    });

    // ============ MODALS ============
    function modal(html) {
        const existing = document.querySelector('.modal-overlay');
        if (existing) existing.remove();
        const overlay = document.createElement('div'); overlay.className = 'modal-overlay';
        overlay.innerHTML = `<div class="modal">${html}</div>`;
        overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
        document.body.appendChild(overlay);
        return overlay;
    }

    // ============ ADD ASSET ============
    function showAddAssetModal() {
        const m = modal(`
            <h3>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--gray-900)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                Register New Asset
            </h3>
            <div class="form-group"><label>Asset Tag</label><input type="text" id="f_assetTag" placeholder="e.g. B-103"></div>
            <div class="form-group"><label>Asset Name</label><input type="text" id="f_assetName" placeholder="e.g. Boiler B-103"></div>
            <div class="form-group"><label>Asset Type</label><select id="f_assetType"><option>boiler</option><option>vessel</option><option>exchanger</option><option>piping</option></select></div>
            <div class="form-group"><label>Manufacturer</label><input type="text" id="f_manufacturer" placeholder="Manufacturer name"></div>
            <div class="form-group"><label>Installation Date</label><input type="date" id="f_installDate"></div>
            <div class="form-group"><label>Design Life (years)</label><input type="number" id="f_designLife" value="25" min="1"></div>
            <div class="form-group"><label>Initial Health (%)</label><input type="number" id="f_health" value="100" min="0" max="100"></div>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="this.closest('.modal-overlay').remove()">Cancel</button>
                <button class="btn btn-primary" id="saveAssetBtn">Create Asset</button>
            </div>
        `);
        document.getElementById('saveAssetBtn').onclick = async () => {
            const data = {
                assetTag: document.getElementById('f_assetTag').value,
                assetName: document.getElementById('f_assetName').value,
                assetType: document.getElementById('f_assetType').value,
                manufacturer: document.getElementById('f_manufacturer').value,
                installDate: document.getElementById('f_installDate').value,
                designLifeYears: parseInt(document.getElementById('f_designLife').value) || 25,
                healthPercentage: parseInt(document.getElementById('f_health').value) || 100
            };
            if (!data.assetTag || !data.assetName) { showToast('Asset Tag and Name are required', 'error'); return; }
            try {
                await apiCall('/assets', 'POST', data);
                showToast(`Asset "${data.assetName}" created`);
                m.remove();
                await loadAllData();
                renderCurrentView();
            } catch (err) { showToast(err.message, 'error'); }
        };
    }

    // ============ ADD INSPECTION ============
    function showAddInspectionModal(assetId) {
        if (!assets.length) { showToast('No assets found. Add an asset first.', 'error'); return; }
        const opts = assets.map(a => `<option value="${a.AssetId}" ${assetId == a.AssetId ? 'selected' : ''}>${escapeHtml(a.AssetName)}</option>`).join('');
        const m = modal(`
            <h3>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--gray-900)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>
                Log New Inspection
            </h3>
            <div class="form-group"><label>Asset</label><select id="f_inspAsset">${opts}</select></div>
            <div class="form-group"><label>Inspection Date</label><input type="date" id="f_inspDate"></div>
            <div class="form-group"><label>Inspection Type</label><select id="f_inspType"><option>visual</option><option>ultrasonic</option><option>radiographic</option><option>magnetic_particle</option></select></div>
            <div class="form-group"><label>Findings</label><textarea id="f_inspFindings" rows="3" placeholder="Describe findings..."></textarea></div>
            <div class="form-group"><label>Risk Score (0-100)</label><input type="number" id="f_inspRisk" value="50" min="0" max="100"></div>
            <div class="form-group"><label>Inspector Name</label><input type="text" id="f_inspector" placeholder="Inspector name"></div>
            <div class="form-group"><label>Next Inspection Date</label><input type="date" id="f_nextInsp"></div>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="this.closest('.modal-overlay').remove()">Cancel</button>
                <button class="btn btn-primary" id="saveInspBtn">Save Inspection</button>
            </div>
        `);
        document.getElementById('saveInspBtn').onclick = async () => {
            const data = {
                assetId: parseInt(document.getElementById('f_inspAsset').value),
                inspectionDate: document.getElementById('f_inspDate').value,
                inspectionType: document.getElementById('f_inspType').value,
                findings: document.getElementById('f_inspFindings').value,
                riskScore: parseInt(document.getElementById('f_inspRisk').value) || 50,
                inspectorName: document.getElementById('f_inspector').value || 'Unknown',
                nextInspectionDate: document.getElementById('f_nextInsp').value
            };
            if (!data.inspectionDate) { showToast('Please select inspection date', 'error'); return; }
            try {
                await apiCall('/inspections', 'POST', data);
                const name = assets.find(a => a.AssetId === data.assetId)?.AssetName || '';
                showToast(`Inspection recorded for ${name}`);
                m.remove();
                await loadAllData();
                renderCurrentView();
            } catch (err) { showToast(err.message, 'error'); }
        };
    }

    // ============ UPLOAD DOCUMENT ============
    function showUploadDocumentModal(assetId) {
        if (!assets.length) { showToast('No assets found. Add an asset first.', 'error'); return; }
        const opts = assets.map(a => `<option value="${a.AssetId}" ${assetId == a.AssetId ? 'selected' : ''}>${escapeHtml(a.AssetName)}</option>`).join('');
        const m = modal(`
            <h3>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--gray-900)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                Upload Document
            </h3>
            <div class="form-group"><label>Asset</label><select id="f_docAsset">${opts}</select></div>
            <div class="form-group"><label>Document Name</label><input type="text" id="f_docName" placeholder="e.g. Design Drawing.pdf"></div>
            <div class="form-group"><label>Document Type</label><select id="f_docType"><option>design_drawing</option><option>repair_drawing</option><option>inspection_report</option><option>material_certificate</option></select></div>
            <div class="form-group"><label>File Reference</label><input type="text" id="f_docFile" placeholder="filename.pdf" value="document.pdf"></div>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="this.closest('.modal-overlay').remove()">Cancel</button>
                <button class="btn btn-primary" id="saveDocBtn">Upload Document</button>
            </div>
        `);
        document.getElementById('saveDocBtn').onclick = async () => {
            const data = {
                assetId: parseInt(document.getElementById('f_docAsset').value),
                documentName: document.getElementById('f_docName').value,
                documentType: document.getElementById('f_docType').value,
                fileName: document.getElementById('f_docFile').value
            };
            if (!data.documentName) { showToast('Document name is required', 'error'); return; }
            try {
                await apiCall('/documents/upload', 'POST', data);
                showToast(`"${data.documentName}" uploaded`);
                m.remove();
                await loadAllData();
                renderCurrentView();
            } catch (err) { showToast(err.message, 'error'); }
        };
    }

    // ============ DASHBOARD ============
    function renderDashboard(container) {
        const totalAssets = assets.length;
        const atRisk = assets.filter(a => a.Status === 'caution' || a.Status === 'critical').length;
        const critical = assets.filter(a => a.Status === 'critical').length;
        const avgHealth = assets.length ? Math.round(assets.reduce((s, a) => s + (a.HealthPercentage || 0), 0) / assets.length) : 0;
        const statusCounts = { operational: 0, caution: 0, critical: 0 };
        assets.forEach(a => statusCounts[a.Status || 'operational']++);

        container.innerHTML = `
            <div class="kpi-grid">
                <div class="kpi-card">
                    <div class="kpi-icon" style="background:#eff6ff;color:var(--blue);"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg></div>
                    <div class="kpi-value">${totalAssets}</div>
                    <div class="kpi-label">Total Assets</div>
                </div>
                <div class="kpi-card">
                    <div class="kpi-icon" style="background:#fffbeb;color:var(--amber);"><svg viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></div>
                    <div class="kpi-value">${atRisk}</div>
                    <div class="kpi-label">Assets at Risk</div>
                </div>
                <div class="kpi-card">
                    <div class="kpi-icon" style="background:#fef2f2;color:var(--red);"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg></div>
                    <div class="kpi-value">${critical}</div>
                    <div class="kpi-label">Critical Condition</div>
                </div>
                <div class="kpi-card">
                    <div class="kpi-icon" style="background:#f0fdf4;color:var(--green);"><svg viewBox="0 0 24 24"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg></div>
                    <div class="kpi-value">${avgHealth}%</div>
                    <div class="kpi-label">Average Health</div>
                </div>
                <div class="kpi-card">
                    <div class="kpi-icon" style="background:#f5f3ff;color:#8b5cf6;"><svg viewBox="0 0 24 24"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg></div>
                    <div class="kpi-value">${inspections.length}</div>
                    <div class="kpi-label">Inspections</div>
                </div>
                <div class="kpi-card">
                    <div class="kpi-icon" style="background:#fdf2f8;color:#ec4899;"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg></div>
                    <div class="kpi-value">${documents.length}</div>
                    <div class="kpi-label">Documents</div>
                </div>
            </div>

            <div class="charts-row">
                <div class="chart-card">
                    <h3>Asset Health Distribution</h3>
                    <canvas id="healthChart"></canvas>
                </div>
                <div class="chart-card">
                    <h3>Status Overview</h3>
                    <canvas id="statusChart"></canvas>
                </div>
            </div>

            <div class="section-header">
                <h3>Asset Health Heat Map</h3>
                <button class="btn btn-primary" onclick="showAddAssetModal()">
                    <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    Add Asset
                </button>
            </div>
            <div class="asset-grid" id="assetGrid"></div>
        `;

        // Charts
        setTimeout(() => {
            Object.values(chartInstances).forEach(c => { try { c.destroy(); } catch(e) {} });
            chartInstances = {};

            const hCtx = document.getElementById('healthChart')?.getContext('2d');
            if (hCtx && assets.length) {
                chartInstances.health = new Chart(hCtx, {
                    type: 'bar',
                    data: {
                        labels: assets.map(a => a.AssetName),
                        datasets: [{
                            label: 'Health %',
                            data: assets.map(a => a.HealthPercentage || 0),
                            backgroundColor: assets.map(a => healthColor(a.HealthPercentage)),
                            borderRadius: 4,
                            borderSkipped: false
                        }]
                    },
                    options: {
                        responsive: true, maintainAspectRatio: true,
                        plugins: { legend: { display: false } },
                        scales: {
                            y: { beginAtZero: true, max: 100, grid: { color: 'rgba(0,0,0,0.04)' } },
                            x: { grid: { display: false } }
                        }
                    }
                });
            }

            const sCtx = document.getElementById('statusChart')?.getContext('2d');
            if (sCtx) {
                chartInstances.status = new Chart(sCtx, {
                    type: 'doughnut',
                    data: {
                        labels: ['Operational', 'Caution', 'Critical'],
                        datasets: [{
                            data: [statusCounts.operational, statusCounts.caution, statusCounts.critical],
                            backgroundColor: ['#22c55e', '#f59e0b', '#ef4444'],
                            borderWidth: 0
                        }]
                    },
                    options: {
                        responsive: true, maintainAspectRatio: true,
                        plugins: { legend: { position: 'bottom', labels: { padding: 16, usePointStyle: true, pointStyle: 'circle' } } },
                        cutout: '65%'
                    }
                });
            }
        }, 50);

        const grid = document.getElementById('assetGrid');
        if (grid) {
            grid.innerHTML = '';
            assets.forEach(asset => {
                const health = asset.HealthPercentage || 0;
                const status = asset.Status || 'operational';
                const borderClass = `border-${status}`;
                const badgeClass = `badge badge-${status}`;
                grid.innerHTML += `
                    <div class="asset-card ${borderClass}" onclick="viewAsset(${asset.AssetId})">
                        <div style="display:flex;justify-content:space-between;align-items:center;">
                            <span class="asset-name">${escapeHtml(asset.AssetName)}</span>
                            <span class="${badgeClass}"><span class="dot"></span>${statusLabel(status)}</span>
                        </div>
                        <div class="asset-meta">${asset.AssetType}${asset.Manufacturer ? ' | ' + escapeHtml(asset.Manufacturer) : ''}</div>
                        <div class="health-row">
                            <div class="health-header"><span>Health: ${health}%</span><span>RUL: ${asset.RemainingLifeDays || 365} days</span></div>
                            <div class="health-bar"><div class="health-bar-fill" style="width:${health}%;background:${healthColor(health)};"></div></div>
                        </div>
                    </div>`;
            });
        }
    }

    // ============ ASSETS LIST ============
    function renderAssetsList(container) {
        container.innerHTML = `
            <div style="display:flex;justify-content:flex-end;margin-bottom:20px;">
                <button class="btn btn-primary" onclick="showAddAssetModal()">
                    <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    Add Asset
                </button>
            </div>
            <div class="asset-grid" id="assetGrid"></div>
        `;
        const grid = document.getElementById('assetGrid');
        if (grid) {
            grid.innerHTML = '';
            assets.forEach(asset => {
                const health = asset.HealthPercentage || 0;
                const status = asset.Status || 'operational';
                grid.innerHTML += `
                    <div class="asset-card border-${status}" onclick="viewAsset(${asset.AssetId})">
                        <div style="display:flex;justify-content:space-between;align-items:center;">
                            <span class="asset-name">${escapeHtml(asset.AssetName)}</span>
                            <span class="badge badge-${status}"><span class="dot"></span>${statusLabel(status)}</span>
                        </div>
                        <div class="asset-meta">${escapeHtml(asset.AssetTag)} | ${asset.AssetType}</div>
                        <div class="health-row">
                            <div class="health-header"><span>Health: ${health}%</span></div>
                            <div class="health-bar"><div class="health-bar-fill" style="width:${health}%;background:${healthColor(health)};"></div></div>
                        </div>
                        <div style="margin-top:12px;">
                            <span class="btn btn-secondary btn-xs">View Details</span>
                        </div>
                    </div>`;
            });
            if (!assets.length) {
                grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--gray-400);">No assets registered. Click "Add Asset" to get started.</div>';
            }
        }
    }

    // ============ INSPECTIONS ============
    function renderInspections(container) {
        container.innerHTML = `
            <div style="display:flex;justify-content:flex-end;margin-bottom:20px;">
                <button class="btn btn-primary" onclick="showAddInspectionModal()">
                    <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    Add Inspection
                </button>
            </div>
            <div class="table-wrap">
                <table class="data-table">
                    <thead><tr><th>Date</th><th>Asset</th><th>Type</th><th>Findings</th><th>Risk</th><th>Actions</th></tr></thead>
                    <tbody id="inspTable"></tbody>
                </table>
            </div>
        `;
        const tbody = document.getElementById('inspTable');
        if (tbody) {
            tbody.innerHTML = '';
            inspections.forEach(ins => {
                const asset = assets.find(a => a.AssetId === ins.AssetId);
                const risk = riskLabel(ins.RiskScore);
                tbody.innerHTML += `
                    <tr>
                        <td style="white-space:nowrap;">${formatDate(ins.InspectionDate)}</td>
                        <td><strong>${asset?.AssetName || 'Unknown'}</strong></td>
                        <td>${ins.InspectionType}</td>
                        <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${escapeHtml((ins.Findings || '').substring(0, 60))}</td>
                        <td><span class="badge badge-risk-${risk}"><span class="dot"></span>${ins.RiskScore}</span></td>
                        <td><button class="btn btn-secondary btn-xs" onclick="viewAsset(${ins.AssetId})">View Asset</button></td>
                    </tr>`;
            });
            if (!inspections.length) {
                tbody.innerHTML = '<tr><td colspan="6" class="empty">No inspections recorded.</td></tr>';
            }
        }
    }

    // ============ DOCUMENTS ============
    function renderDocuments(container) {
        container.innerHTML = `
            <div style="display:flex;justify-content:flex-end;margin-bottom:20px;">
                <button class="btn btn-primary" onclick="showUploadDocumentModal()">
                    <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                    Upload Document
                </button>
            </div>
            <div class="table-wrap">
                <table class="data-table">
                    <thead><tr><th>Asset</th><th>Document Name</th><th>Type</th><th>Date</th><th>Actions</th></tr></thead>
                    <tbody id="docTableBody"></tbody>
                </table>
            </div>
        `;
        const tbody = document.getElementById('docTableBody');
        if (tbody) {
            tbody.innerHTML = '';
            documents.forEach(doc => {
                const asset = assets.find(a => a.AssetId === doc.AssetId);
                tbody.innerHTML += `
                    <tr>
                        <td>${asset?.AssetName || 'Unknown'}</td>
                        <td>
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle;margin-right:4px;color:var(--gray-400);"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                            ${escapeHtml(doc.DocumentName)}
                        </td>
                        <td>${doc.DocumentType}</td>
                        <td>${formatDate(doc.UploadedAt)}</td>
                        <td><button class="btn btn-secondary btn-xs" onclick="showToast('Document: ${escapeHtml(doc.DocumentName)}', 'success')">View</button></td>
                    </tr>`;
            });
            if (!documents.length) {
                tbody.innerHTML = '<tr><td colspan="5" class="empty">No documents uploaded.</td></tr>';
            }
        }
    }

    // ============ USERS ============
    function renderUsers(container) {
        container.innerHTML = `
            <div style="background:white;border-radius:var(--radius);padding:40px;text-align:center;border:1px solid var(--gray-200);">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="var(--gray-300)" stroke-width="1.5" style="margin-bottom:16px;"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                <h3 style="font-weight:600;margin-bottom:8px;color:var(--gray-700);">User Management</h3>
                <p style="color:var(--gray-500);font-size:0.9rem;">User management is available to administrators.</p>
            </div>`;
    }

    // ============ REPORTS ============
    function renderReports(container) {
        const avgHealth = assets.length ? Math.round(assets.reduce((s, a) => s + (a.HealthPercentage || 0), 0) / assets.length) : 0;
        const atRisk = assets.filter(a => a.Status !== 'operational').length;
        container.innerHTML = `
            <div class="detail-card">
                <div class="detail-header"><h2>Executive Report</h2></div>
                <div class="detail-body">
                    <div class="detail-grid">
                        <div class="detail-stat"><div class="stat-label">Total Assets</div><div class="stat-value">${assets.length}</div></div>
                        <div class="detail-stat"><div class="stat-label">Average Health</div><div class="stat-value">${avgHealth}%</div></div>
                        <div class="detail-stat"><div class="stat-label">At Risk</div><div class="stat-value">${atRisk}</div></div>
                        <div class="detail-stat"><div class="stat-label">Total Inspections</div><div class="stat-value">${inspections.length}</div></div>
                    </div>
                    <h4 style="font-size:0.95rem;font-weight:600;color:var(--gray-700);margin-bottom:12px;">Asset Breakdown</h4>
                    <div style="display:flex;flex-direction:column;gap:8px;">
                        ${assets.map(a => `
                            <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:var(--gray-50);border-radius:var(--radius-sm);">
                                <span style="font-weight:500;font-size:0.88rem;">${escapeHtml(a.AssetName)}</span>
                                <span style="display:flex;align-items:center;gap:8px;">
                                    <span style="font-size:0.85rem;color:var(--gray-600);">${a.HealthPercentage || 0}%</span>
                                    <span class="badge badge-${a.Status || 'operational'}"><span class="dot"></span>${statusLabel(a.Status)}</span>
                                </span>
                            </div>
                        `).join('') || '<div style="color:var(--gray-400);padding:20px;text-align:center;">No assets registered.</div>'}
                    </div>
                    <div style="margin-top:24px;">
                        <button class="btn btn-primary" onclick="showToast('Report export initiated')">
                            <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                            Download Report
                        </button>
                    </div>
                </div>
            </div>`;
    }

    // ============ ASSET DETAIL ============
    function viewAsset(assetId) {
        const asset = assets.find(a => a.AssetId === assetId);
        if (!asset) return;
        const assetInspections = inspections.filter(i => i.AssetId === assetId);
        const assetDocs = documents.filter(d => d.AssetId === assetId);
        const statusClass = `badge badge-${asset.Status || 'operational'}`;

        let html = `
            <button class="btn btn-secondary btn-sm" onclick="setActiveTab('assets')" style="margin-bottom:20px;">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
                Back to Assets
            </button>
            <div class="detail-card">
                <div class="detail-header">
                    <h2>${escapeHtml(asset.AssetName)}</h2>
                    <span class="${statusClass}"><span class="dot"></span>${statusLabel(asset.Status)}</span>
                </div>
                <div class="detail-body">
                    <div class="detail-grid">
                        <div class="detail-stat"><div class="stat-label">Health Score</div><div class="stat-value">${asset.HealthPercentage}%</div></div>
                        <div class="detail-stat"><div class="stat-label">Remaining Life</div><div class="stat-value">${asset.RemainingLifeDays} days</div></div>
                        <div class="detail-stat"><div class="stat-label">Install Date</div><div class="stat-value">${formatDate(asset.InstallDate)}</div></div>
                        <div class="detail-stat"><div class="stat-label">Design Life</div><div class="stat-value">${asset.DesignLifeYears || 25} years</div></div>
                        <div class="detail-stat"><div class="stat-label">Corrosion Rate</div><div class="stat-value">${asset.CorrosionRateMmPerYear || 0.1} mm/yr</div></div>
                        <div class="detail-stat"><div class="stat-label">Operational Cycles</div><div class="stat-value">${asset.OperationalCycles || 0}</div></div>
                    </div>

                    <div style="margin-bottom:24px;">
                        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
                            <h4 style="font-size:0.95rem;font-weight:600;color:var(--gray-700);">Inspection History</h4>
                            <button class="btn btn-primary btn-sm" onclick="showAddInspectionModal(${asset.AssetId})">
                                <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                                Add Inspection
                            </button>
                        </div>
                        <div class="table-wrap">
                            <table class="data-table">
                                <thead><tr><th>Date</th><th>Type</th><th>Findings</th><th>Risk</th></tr></thead>
                                <tbody>
                                    ${assetInspections.map(i => `
                                        <tr>
                                            <td>${formatDate(i.InspectionDate)}</td>
                                            <td>${i.InspectionType}</td>
                                            <td>${escapeHtml((i.Findings || '').substring(0, 60))}</td>
                                            <td><span class="badge badge-risk-${riskLabel(i.RiskScore)}"><span class="dot"></span>${i.RiskScore}</span></td>
                                        </tr>
                                    `).join('') || '<tr><td colspan="4" class="empty">No inspections recorded</td></tr>'}
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <div>
                        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
                            <h4 style="font-size:0.95rem;font-weight:600;color:var(--gray-700);">Documents (${assetDocs.length})</h4>
                            <button class="btn btn-primary btn-sm" onclick="showUploadDocumentModal(${asset.AssetId})">
                                <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                                Upload Document
                            </button>
                        </div>
                        <div style="display:flex;flex-direction:column;gap:6px;">
                            ${assetDocs.map(d => `
                                <div style="display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--gray-50);border-radius:var(--radius-sm);font-size:0.88rem;">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--gray-400)" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                                    <span style="flex:1;">${escapeHtml(d.DocumentName)}</span>
                                    <span style="color:var(--gray-500);font-size:0.78rem;">${d.DocumentType}</span>
                                    <span style="color:var(--gray-400);font-size:0.78rem;">${formatDate(d.UploadedAt)}</span>
                                </div>
                            `).join('') || '<div style="color:var(--gray-400);padding:12px;font-size:0.88rem;">No documents uploaded</div>'}
                        </div>
                    </div>
                </div>
            </div>`;

        document.getElementById('dynamicContent').innerHTML = html;
    }

    // ============ EXPOSE GLOBALS ============
    window.handleLogin = handleLogin;
    window.logout = logout;
    window.viewAsset = viewAsset;
    window.setActiveTab = setActiveTab;
    window.showAddAssetModal = showAddAssetModal;
    window.showAddInspectionModal = showAddInspectionModal;
    window.showUploadDocumentModal = showUploadDocumentModal;
</script>
</body>
</html>
